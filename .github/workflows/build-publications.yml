name: Build publications.bib

on:
  issues:
    types: [labeled]   # triggers whenever a label is added to any issue
  workflow_dispatch:   # allow manual runs from the Actions tab

jobs:
  build:
    # Only run when a publication label was applied
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.label.name, 'publication:')

    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit publications.bib
      issues: read

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: |
          Rscript -e "install.packages('pak', repos = 'https://r-lib.github.io/p/pak/stable/')"
          Rscript -e "pak::pak(c('RefManageR', 'gh', 'glue'))"

      - name: Build publications.bib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: Rscript R/build_bib.R

      - name: Commit updated publications.bib
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications.bib
          git diff --staged --quiet || git commit -m "Update publications.bib [skip ci]"
          git push

name: Fetch publications

on:
  schedule:
    - cron: "0 8 1 * *" # 08:00 UTC on the 1st of every month
  workflow_dispatch:     # allow manual runs from the Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      issues: write  # needed to create issues

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: |
          Rscript -e "install.packages('pak', repos = 'https://r-lib.github.io/p/pak/stable/')"
          Rscript -e "pak::pak(c('orcidtr', 'RefManageR', 'gh', 'glue'))"

      - name: Fetch and create issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: Rscript R/fetch_publications.R
